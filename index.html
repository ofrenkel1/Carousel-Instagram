<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World in Motion</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--white:#ffffff;--black:#000000;--gray-50:#fafafa;--gray-200:#efefef;--gray-400:#999999;--gray-600:#555555;--blue:#3d82f7}
body{background:var(--gray-50);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px 0}
.ig-post{width:100%;max-width:470px;background:var(--white);border:1px solid var(--gray-200);border-radius:3px;font-size:14px;color:var(--black)}
.ig-header{display:flex;align-items:center;gap:12px;padding:12px 14px}
.avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(45deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);padding:2px;flex-shrink:0;cursor:pointer}
.avatar-inner{width:100%;height:100%;border-radius:50%;background:var(--white);display:flex;align-items:center;justify-content:center;border:2px solid white}
.avatar-inner svg{width:20px;height:20px;color:var(--gray-400)}
.header-text{flex:1}.username{font-weight:600;font-size:13.5px;letter-spacing:-0.01em}.location{font-size:11px;color:var(--gray-600);margin-top:1px}
.more-btn{padding:4px;cursor:pointer;display:flex;align-items:center}
.ig-media{width:100%;aspect-ratio:1/1;position:relative;overflow:hidden;background:var(--black);cursor:pointer}
.ig-media img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;display:block;transition:opacity 0.25s ease}
img.fade-out{opacity:0}
.slide-counter{position:absolute;top:14px;right:14px;background:rgba(0,0,0,0.65);color:#fff;font-size:12px;font-weight:600;padding:4px 10px;border-radius:20px;letter-spacing:0.02em;pointer-events:none;backdrop-filter:blur(4px);z-index:5}
.arrow{position:absolute;top:50%;transform:translateY(-50%);width:32px;height:32px;background:rgba(255,255,255,0.92);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.25);z-index:10;opacity:0;transition:opacity 0.2s ease,background 0.15s ease}
.ig-media:hover .arrow{opacity:1}.arrow:hover{background:white}.arrow.prev{left:10px}.arrow.next{right:10px}.arrow.hidden{display:none!important}
.dot-bar{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:5px;align-items:center;pointer-events:none;z-index:5}
.ig-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.55);transition:background 0.2s,transform 0.2s}
.ig-dot.active{background:var(--blue);transform:scale(1.25)}
.ig-actions{padding:6px 14px 4px;display:flex;align-items:center;gap:4px}
.action-btn{background:none;border:none;padding:8px;cursor:pointer;color:var(--black);display:flex;align-items:center;transition:transform 0.1s ease}
.action-btn:hover{transform:scale(1.1)}.action-btn:active{transform:scale(0.9)}.action-btn.liked svg{fill:#ed4956;stroke:#ed4956}.save-btn{margin-left:auto}
.ig-likes{padding:2px 14px 6px;font-weight:700;font-size:13.5px;cursor:pointer}
.ig-caption{padding:2px 14px 6px;font-size:13.5px;line-height:1.55}
.caption-user{font-weight:700;margin-right:5px}
.caption-headline{font-weight:700;font-size:14.5px;letter-spacing:-0.01em;display:block;margin-bottom:3px;transition:opacity 0.2s ease}
.caption-sub{font-style:italic;font-family:'Instrument Serif',serif;font-size:14px;color:var(--gray-600);transition:opacity 0.2s ease}
.caption-tags{display:block;margin-top:5px;color:var(--blue);font-size:13px}
.ig-comments-link{padding:3px 14px 4px;font-size:13.5px;color:var(--gray-400);cursor:pointer}
.ig-timestamp{padding:4px 14px 10px;font-size:10px;color:var(--gray-400);text-transform:uppercase;letter-spacing:0.04em}
.ig-add-comment{border-top:1px solid var(--gray-200);padding:10px 14px;display:flex;align-items:center;gap:10px}
.comment-avatar{width:28px;height:28px;border-radius:50%;background:var(--gray-200);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.comment-input{flex:1;background:none;border:none;outline:none;font-size:13.5px;color:var(--black);font-family:inherit}
.comment-input::placeholder{color:var(--gray-400)}
.post-btn{background:none;border:none;color:var(--blue);font-weight:700;font-size:13.5px;cursor:pointer;opacity:0;pointer-events:none;transition:opacity 0.15s}
.post-btn.visible{opacity:1;pointer-events:auto}
</style>
</head>

const TOTAL=SLIDES.length;
let current=0,liked=false,likeCount=2847,touchStartX=0,animating=false;
const mainImg=document.getElementById('mainImg'),counter=document.getElementById('slideCounter'),headline=document.getElementById('captionHeadline'),desc=document.getElementById('captionDesc'),dotBar=document.getElementById('dotBar'),prevArrow=document.getElementById('prevArrow'),nextArrow=document.getElementById('nextArrow'),likeBtn=document.getElementById('likeBtn'),likesEl=document.getElementById('likesCount');
SLIDES.forEach((_,i)=>{const d=document.createElement('div');d.className='ig-dot'+(i===0?' active':'');dotBar.appendChild(d);});
headline.style.transition='opacity 0.2s ease';desc.style.transition='opacity 0.2s ease';
function goTo(idx){if(animating||idx===current||idx<0||idx>=TOTAL)return;animating=true;mainImg.classList.add('fade-out');headline.style.opacity='0';desc.style.opacity='0';setTimeout(()=>{current=idx;mainImg.src=SLIDES[current].src;mainImg.alt=SLIDES[current].title;mainImg.classList.remove('fade-out');headline.textContent=SLIDES[current].title;desc.textContent=SLIDES[current].desc;headline.style.opacity='1';desc.style.opacity='1';counter.textContent=(current+1)+' / '+TOTAL;document.querySelectorAll('.ig-dot').forEach((d,i)=>d.classList.toggle('active',i===current));prevArrow.classList.toggle('hidden',current===0);nextArrow.classList.toggle('hidden',current===TOTAL-1);animating=false;},220);}
mainImg.src=SLIDES[0].src;headline.textContent=SLIDES[0].title;desc.textContent=SLIDES[0].desc;
prevArrow.addEventListener('click',e=>{e.stopPropagation();goTo(current-1);});
nextArrow.addEventListener('click',e=>{e.stopPropagation();goTo(current+1);});
likeBtn.addEventListener('click',()=>{liked=!liked;likeCount+=liked?1:-1;likeBtn.classList.toggle('liked',liked);likeBtn.style.transform='scale(1.3)';setTimeout(()=>likeBtn.style.transform='',200);likesEl.textContent=likeCount.toLocaleString()+' likes';});
let lastTap=0;document.getElementById('igMedia').addEventListener('click',()=>{const now=Date.now();if(now-lastTap<300&&!liked){liked=true;likeCount++;likeBtn.classList.add('liked');likesEl.textContent=likeCount.toLocaleString()+' likes';}lastTap=now;});
document.getElementById('igMedia').addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;},{passive:true});
document.getElementById('igMedia').addEventListener('touchend',e=>{const diff=touchStartX-e.changedTouches[0].clientX;if(Math.abs(diff)>40)diff>0?goTo(current+1):goTo(current-1);},{passive:true});
document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')goTo(current+1);if(e.key==='ArrowLeft')goTo(current-1);});
const ci=document.getElementById('commentInput'),pb=document.getElementById('postBtn');
ci.addEventListener('input',()=>pb.classList.toggle('visible',ci.value.length>0));
pb.addEventListener('click',()=>{ci.value='';pb.classList.remove('visible');});
</script>
